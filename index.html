<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LSO Account Manager</title>

<style>
body{
background:#0f1116;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#181c25;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:#181c25;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#0f1116;
color:white;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:10px;
}

.token{
display:flex;
justify-content:space-between;
background:#0f1116;
padding:12px;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<header>LSO Account Manager</header>

<div class="container">

<div class="card">
<h3>Saved Tokens</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>Add Token</h3>
<input id="name" placeholder="Account name">
<input id="token" placeholder="token_xxxxx">
<button onclick="addToken()">Add Token</button>
</div>

</div>

<script>

function getTokens(){
return JSON.parse(localStorage.getItem("tokens")||"[]");
}

function saveTokens(t){
localStorage.setItem("tokens",JSON.stringify(t));
}

function render(){

let tokens=getTokens();
let list=document.getElementById("list");
list.innerHTML="";

tokens.forEach((t,i)=>{

let div=document.createElement("div");
div.className="token";

div.innerHTML=`
<div>${t.name}</div>
<div>
<button onclick="activate(${i})">Activate</button>
<button onclick="del(${i})">Delete</button>
</div>
`;

list.appendChild(div);

});

}

function addToken(){

let name=document.getElementById("name").value;
let token=document.getElementById("token").value;

let tokens=getTokens();

tokens.push({name,token});

saveTokens(tokens);

render();

}

function del(i){

let tokens=getTokens();
tokens.splice(i,1);
saveTokens(tokens);

render();

}

function activate(i){

let tokens=getTokens();
let token=tokens[i].token;

/* start exploit */

startExploit(token);

}

render();

</script>

<script src="exploit.js"></script>

</body>
</html>
