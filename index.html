<!DOCTYPE html>
<html>
<head>

<title>LSO Account Manager</title>

<style>
body{
    background:#0f1116;
    color:white;
    font-family:Segoe UI,Arial;
    margin:0;
}

header{
    background:#181c25;
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.card{
    background:#181c25;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.4);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#0f1116;
    color:white;
    font-size:16px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
}

button:hover{
    background:#2563eb;
}

.token{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0f1116;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
}

.actions button{
    margin-left:8px;
    background:#444;
    color:white;
}

.actions button.activate{
    background:#22c55e;
}

.actions button.delete{
    background:#ef4444;
}

.status{
    margin-top:15px;
    color:#9ca3af;
    font-size:14px;
}
</style>

</head>

<body>

<header>
LSO Account Manager
</header>

<div class="container">

<div class="card">
<h3>Saved Tokens</h3>
<div id="tokenList">Loading...</div>
<div class="status" id="status"></div>
</div>

<div class="card">
<h3>Add New Token</h3>
<input id="name" placeholder="Account name (example: Main Account)">
<input id="token" placeholder="token_username_123456789">
<button onclick="addToken()">Add Token</button>
</div>

</div>

<script>

// PS4 payload API
const API = "http://127.0.0.1:9020";

function setStatus(msg){
    document.getElementById("status").innerText = msg;
}


// =============================
// AUTO RUN PAYLOAD
// =============================

async function runPayload(){
    try{
        setStatus("Running payload...");

        // Trigger payload
        await fetch(API + "/run");

        setStatus("Payload executed.");
    }catch(e){
        setStatus("Payload trigger failed or already running.");
    }
}


// =============================
// TOKEN FUNCTIONS
// =============================

async function loadTokens(){
    setStatus("Loading tokens...");
    try {
        let res = await fetch(API + "/tokens");
        let tokens = await res.json();
        renderTokens(tokens);
        setStatus("Tokens loaded");
    } catch(e) {
        document.getElementById("tokenList").innerHTML = "⚠ Payload not running or network error.";
        setStatus("");
    }
}

function renderTokens(tokens){
    let list = document.getElementById("tokenList");
    list.innerHTML = "";

    if(tokens.length === 0){
        list.innerHTML = "No saved tokens.";
        return;
    }

    tokens.forEach(t=>{
        let div = document.createElement("div");
        div.className = "token";
        div.innerHTML = `
            <div>${t.name}</div>
            <div class="actions">
                <button class="activate" onclick="activate('${t.token}')">Activate</button>
                <button class="delete" onclick="removeToken('${t.token}')">Delete</button>
            </div>
        `;
        list.appendChild(div);
    });
}

async function addToken(){
    let name = document.getElementById("name").value.trim();
    let token = document.getElementById("token").value.trim();

    if(!name || !token){
        setStatus("Enter both account name and token.");
        return;
    }

    try {
        await fetch(API + "/add",{
            method:"POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body: "name=" + encodeURIComponent(name) + "&token=" + encodeURIComponent(token)
        });

        document.getElementById("name").value = "";
        document.getElementById("token").value = "";
        setStatus("Token added.");
        loadTokens();
    } catch(e){
        setStatus("Failed to add token. Is payload running?");
    }
}

async function activate(token){
    try {
        await fetch(API + "/set",{
            method:"POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body: "token=" + encodeURIComponent(token)
        });
        setStatus("Token activated.");
    } catch(e){
        setStatus("Failed to activate token.");
    }
}

async function removeToken(token){
    try {
        await fetch(API + "/delete",{
            method:"POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body: "token=" + encodeURIComponent(token)
        });
        setStatus("Token removed.");
        loadTokens();
    } catch(e){
        setStatus("Failed to remove token.");
    }
}


// =============================
// PAGE LOAD SEQUENCE
// =============================

window.onload = async function(){

    // Step 1 run payload
    await runPayload();

    // Step 2 wait a moment for payload to initialize
    setTimeout(loadTokens, 1500);

};

</script>

</body>
</html>
